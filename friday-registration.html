<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Free Play Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">🏸 Badminton Club</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">Cancel</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0">Apply for Friday Free Play</h4>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" value="John Doe" readonly>
                                    <div class="form-text">Auto-filled from your profile.</div>
                                </div>
                                <div class="col">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" value="player@example.com" readonly>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Skill Level</label>
                                <select class="form-select">
                                    <option value="beginner">Beginner</option>
                                    <option value="amateur" selected>Amateur</option>
                                    <option value="intermediate">Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="needRacket">
                                <label class="form-check-label text-danger fw-bold" for="needRacket">I need to borrow a club racket</label>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Additional Comments (Optional)</label>
                                <textarea class="form-control" rows="2" placeholder="E.g., bringing a +1 guest..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Submit Application</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
