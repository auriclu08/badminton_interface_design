<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🏸 Badminton Club</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="attendance.html">My Attendance</a>
                <a class="nav-link" href="friday-registration.html">Friday Free Play</a>
                <a class="nav-link text-danger" href="index.html">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Welcome back!</h2>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white">Upcoming Practice</div>
                    <div class="card-body">
                        <h5 class="card-title">Monday Session</h5>
                        <p class="card-text">Date: Sep 1, 2026<br>Time: 14:00 - 16:00</p>
                        <button class="btn btn-success">Confirm Attendance</button>
                        <button class="btn btn-outline-danger">Cannot Attend</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-info text-white">My Stats</div>
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <h1 class="display-4 text-primary">88%</h1>
                        <p class="text-muted">Current Attendance Rate</p>
                        <a href="attendance.html" class="btn btn-sm btn-outline-secondary">View History</a>

                </div>
